[package]
name = "janus-data"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
name = "janus_data"
path = "src/lib.rs"

[[bin]]
name = "janus-data"
path = "src/main.rs"

[dependencies]
# Internal JANUS crates (shared libraries)
janus-questdb-writer = { path = "../../crates/questdb-writer" }
janus-rate-limiter = { path = "../../crates/rate-limiter" }
janus-gap-detection = { path = "../../crates/gap-detection" }

# New unified JANUS dependencies
janus-core = { workspace = true }
janus-exchanges = { path = "../../crates/exchanges", features = ["cns-metrics"] }
janus-cns = { path = "../../crates/cns" }

# Async Runtime
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }

# HTTP Client
reqwest = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }
tonic-prost = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Error Handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Redis for state management
redis = { workspace = true }

# Time handling
chrono = { workspace = true }

# Cryptography (for API signatures)
hmac = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }

# Configuration
config = { workspace = true }
dotenvy = { workspace = true }

# Numeric types (high precision for prices)
rust_decimal = { version = "1.39.0", features = ["serde-float"] }

# HTML Scraping (for ETF flows)
scraper = "0.25.0"
select = "0.6.1"

# URL handling
url = "2.5.7"

# Rate limiting
governor = "0.10.4"

# Utilities
bytes = "1.11.0"
regex = "1.12"
parking_lot = "0.12.5"
socket2 = { version = "0.6.1", features = ["all"] }
uuid = { version = "1.19.0", features = ["v4", "serde"] }

# JWT Authentication
jsonwebtoken = "9.3.0"

# HTTP/WebSocket Server
axum = { workspace = true, features = ["macros"] }
tower = { workspace = true }
tower-http = { workspace = true, features = ["compression-gzip"] }
hyper = { workspace = true, features = ["full"] }

# gRPC (for Python UMAP service integration)
tonic = { workspace = true }
tonic-web = "0.14.2"

# Metrics (Prometheus)
prometheus = { workspace = true }
# System monitoring (disk usage)
nix = { version = "0.30.1", features = ["fs"] }

[dev-dependencies]
tokio-test = "0.4.4"
mockito = "1.7.1"

# Build dependencies removed - proto compilation is now centralized in fks-proto crate
# If gRPC is needed in the future, import types using: use fks_proto::data::*;

[features]
default = []
debug = []
