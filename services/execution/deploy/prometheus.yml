global:
    scrape_interval: 15s
    evaluation_interval: 15s
    external_labels:
        cluster: "execution-service"

scrape_configs:
    - job_name: "execution-service"
      static_configs:
          - targets: ["execution-service:8081"]
      metrics_path: "/metrics"
      scrape_interval: 10s

    - job_name: "redis"
      static_configs:
          - targets: ["redis:6379"]

    - job_name: "questdb"
      static_configs:
          - targets: ["questdb:9003"]

alerting:
    alertmanagers:
        - static_configs:
              - targets: []

rule_files:
    - "/etc/prometheus/alert_rules.yml"
