apiVersion: v1
kind: Secret
metadata:
  name: execution-secrets
  namespace: execution
type: Opaque
stringData:
  # Replace with actual base64-encoded values or use Vault
  BYBIT_API_KEY: "your_api_key_here"
  BYBIT_API_SECRET: "your_api_secret_here"
  # For testnet:
  BYBIT_TESTNET_API_KEY: "your_testnet_key"
  BYBIT_TESTNET_API_SECRET: "your_testnet_secret"
