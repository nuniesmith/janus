[package]
name = "janus-forward"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "janus-forward"
path = "src/main.rs"

[[bin]]
name = "regime-bridge-consumer"
path = "src/regime_bridge_consumer.rs"

[[test]]
name = "param_reload_integration"
path = "tests/param_reload_integration.rs"

[[test]]
name = "regime_mr_integration"
path = "tests/regime_mr_integration.rs"

[[test]]
name = "regime_bridge_integration"
path = "tests/regime_bridge_integration.rs"

[[test]]
name = "regime_bridge_auth_integration"
path = "tests/regime_bridge_auth_integration.rs"

[[test]]
name = "brain_wiring_integration"
path = "tests/brain_wiring_integration.rs"

[[test]]
name = "brain_runtime_integration"
path = "tests/brain_runtime_integration.rs"

[[test]]
name = "brain_gated_e2e"
path = "tests/brain_gated_e2e.rs"

[[test]]
name = "staging_validation"
path = "tests/staging_validation.rs"

[dependencies]
# Unified JANUS core
janus-core = { workspace = true }

# Centralized proto definitions
fks-proto = { workspace = true }

# Workspace crates
common = { path = "../../crates/common" }
janus-indicators = { path = "../../crates/indicators" }
janus-strategies = { path = "../../crates/strategies" }
janus-regime = { path = "../../crates/regime" }
logic = { path = "../../crates/logic" }
janus-models = { path = "../../crates/models" }
janus-health = { path = "../../crates/health" }
janus-risk = { path = "../../crates/risk" }
janus-cns = { path = "../../crates/cns" }
janus-compliance = { path = "../../crates/compliance" }
janus-bybit-client = { path = "../../crates/bybit-client" }
janus-questdb-writer = { path = "../../crates/questdb-writer" }

# Async Runtime
tokio = { workspace = true }
tokio-stream = { version = "0.1.17", features = ["sync", "net"] }
futures-util = { workspace = true }
futures = "0.3.31"

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# HTTP & Network
axum = { workspace = true }
reqwest = { workspace = true }
tower-http = { version = "0.6.8", features = ["trace"] }

# Time & Date
chrono = { workspace = true }

# Logging & Tracing
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Error Handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Configuration
config = { workspace = true }
toml = { workspace = true }

# Metrics
prometheus = { workspace = true }

# gRPC
tonic = { workspace = true }
tonic-reflection = "0.14.2"
tonic-prost = "0.14.2"
prost = { workspace = true }
prost-types = { workspace = true }

# ML/AI
tract-onnx = { workspace = true }

# Vector DB
qdrant-client = { workspace = true }

# Utilities
uuid = { workspace = true }
rayon = { workspace = true }

# Numeric types (for market data Decimal → f64 conversion)
rust_decimal = { version = "1.39.0", features = ["serde-float"] }

# Database (for signal caching, minimal use)
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "postgres", "chrono", "uuid", "json"], optional = true }

# WebSocket
tokio-tungstenite = "0.28.0"
async-trait = { workspace = true }

# Redis (for real-time state)
redis = { workspace = true }

[dev-dependencies]
tokio-test = "0.4.4"
uuid = { workspace = true }
futures = { workspace = true }
tokio-stream = { version = "0.1.17", features = ["net"] }
chrono = { workspace = true }
janus-cns = { path = "../../crates/cns" }
janus-optimizer = { path = "../../crates/optimizer" }

[build-dependencies]
tonic-prost-build = "0.14.2"

[features]
default = ["redis"]
persistence = ["sqlx"]
redis = []
tls = ["tonic/tls-ring"]
